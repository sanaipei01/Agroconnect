<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroConnect | Farmer Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER -->
<header class="bg-green-700 text-white px-6 py-4 flex justify-between items-center">

  <!-- Left: Title -->
  <h2 class="text-2xl font-bold">Farm Product Listings</h2>

  <!-- Right: User + Logout -->
  <div class="flex items-center gap-4">
    <span id="username" class="font-medium"></span>

    <button 
      id="logoutBtn" 
      class="bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg">
      Logout
    </button>
  </div>

</header>

<!-- FORM SECTION -->
<section class="max-w-2xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<form id="productForm" class="space-y-5">

<h2 class="text-2xl font-bold text-green-700 text-center">
Add New Product
</h2>

<div>
<label class="block mb-1 font-medium">Product Name</label>
<input
type="text"
id="name"
placeholder="Product Name"
class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
required>
</div>

<div>
<label class="block mb-1 font-medium">Quantity (kg)</label>
<input
type="number"
id="quantity"
placeholder="Quantity"
class="w-full border rounded-lg p-3"
required>
</div>

<div>
<label class="block mb-1 font-medium">Price per kg</label>
<input
type="number"
id="price"
placeholder="Price"
class="w-full border rounded-lg p-3"
required>
</div>

<div>
<label class="block mb-1 font-medium">Location</label>
<input
type="text"
id="location"
placeholder="Location"
class="w-full border rounded-lg p-3"
required>
</div>

<div>
<label class="block mb-1 font-medium">Availability</label>

<select
id="availability"
class="w-full border rounded-lg p-3">

<option value="Available">Available</option>
<option value="Out of Stock">Out of Stock</option>

</select>
</div>

<button
type="submit"
class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold">

Add Product

</button>

</form>

</section>

<!-- FARMER PRODUCTS LIST -->
<section class="max-w-6xl mx-auto mt-12">

<h2 class="text-2xl font-bold text-green-700 mb-6 text-center">
My Products
</h2>

<div id="farmerProducts"
class="grid md:grid-cols-3 gap-6">
</div>

</section>

<script>
  const logoutBtn = document.getElementById("logoutBtn");

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
  });

  // show username
  const user = JSON.parse(localStorage.getItem("user"));
  if (user) {
    document.getElementById("username").textContent = user.name;
  }
</script>

<script src="product.js"></script>

</body>
</html>
