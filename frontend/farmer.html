<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agroconnect | Farmer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="navbar">
        <h2>Farm Products Listings</h2>
    </header>

    <section class="form-section">
        <form id="productForm">
            <label for="name">Product Name:</label>
            <input type="text" id="name" placeholder="Product Name" required>

            <label for="Quantity">Quantity:</label>
            <input type="number" id="quantity" placeholder="Quantity (kg)" required>

            <label for="price">Price per kg</label>
            <input type="number" id="price" placeholder="Price Per KG" required>

            <label for="location">Location:</label>
            <input type="text" id="location" placeholder="Loacation" required>

            <select id="availability">
                <option value="">availability</option>
                <option value="Available">Available</option>
                <option value="Out of Stock">Out of Stock</option>
            </select>

            <button type="submit">Add Product</button>
        </form>
    </section>

    <section class="marketplace" id="farmerProducts"></section>

    <script src="products.js"></script>
</body>
</html>
