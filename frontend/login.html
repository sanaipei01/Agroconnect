<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AgroConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="relative min-h-screen flex items-center justify-center font-sans">

<!-- BACKGROUND IMAGE -->

<div class="absolute inset-0 bg-[url('farm-login.jpg')] bg-cover bg-center"></div>

<!-- DARK OVERLAY -->

<div class="absolute inset-0 bg-black/50"></div>

<!-- LOGIN CARD -->

<div class="relative bg-white/10 backdrop-blur-lg border border-white/20 shadow-xl rounded-xl p-10 w-full max-w-md">

<h2 class="text-3xl font-bold text-center text-green-400 mb-6">
AgroConnect Login
</h2>

<form id="loginForm" class="space-y-5">

<div>
<label class="block text-white mb-1">Email</label>
<input 
type="email" 
id="email" 
name="email" 
placeholder="Enter your email"
class="w-full bg-white/20 text-white placeholder-gray-200 border border-white/30 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-400"
required>
</div>

<div>
<label class="block text-white mb-1">Password</label>
<input 
type="password" 
id="password" 
name="password" 
placeholder="Enter your password"
class="w-full bg-white/20 text-white placeholder-gray-200 border border-white/30 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-400"
required>
</div>

<button 
type="submit"
class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition">
Login </button>

</form>

<p class="text-center text-gray-200 mt-6">
Don't have an account? 
<a href="register.html" class="text-green-400 font-semibold hover:underline">
Register here
</a>
</p>

</div>

<script src="login.js"></script>

</body>
</html>
