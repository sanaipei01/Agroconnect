<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AgroConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[url('farm-login.jpg')] bg-cover bg-center min-h-screen flex items-center justify-center">

<!-- LOGIN CARD -->
<div class="bg-white shadow-xl rounded-xl p-10 w-full max-w-md">

<h2 class="text-3xl font-bold text-center text-green-700 mb-6">
AgroConnect Login
</h2>

<form id="loginForm" class="space-y-5">

<div>
<label class="block text-gray-700 mb-1">Email</label>
<input 
type="email" 
id="email" 
name="email" 
placeholder="Enter your email"
class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
required>
</div>

<div>
<label class="block text-gray-700 mb-1">Password</label>
<input 
type="password" 
id="password" 
name="password" 
placeholder="Enter your password"
class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
required>
</div>

<button 
type="submit"
class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition">
Login
</button>

</form>

<p class="text-center text-gray-600 mt-6">
Don't have an account? 
<a href="register.html" class="text-green-600 font-semibold hover:underline">
Register here
</a>
</p>

</div>

<script src="login.js"></script>

</body>
</html>
