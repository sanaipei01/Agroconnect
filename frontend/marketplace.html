<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroConnect | Marketplace</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- NAVBAR -->
<header class="bg-green-700 text-white">
<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<h1 class="text-2xl font-bold">AgroConnect</h1>

<nav>
<ul class="flex gap-6">
<li><a href="index.html" class="hover:text-green-200">Home</a></li>
<li><a href="login.html" class="hover:text-green-200">I am a Farmer</a></li>
<li><a href="marketplace.html" class="hover:text-green-200">Marketplace</a></li>
<li><a href="about.html" class="hover:text-green-200">About Us</a></li>
</ul>
</nav>

</div>
</header>

<!-- PAGE HEADER -->
<section class="bg-[url('farm-register.jpg')] bg-cover bg-center text-white py-20 text-center">

<h1 class="text-4xl font-bold mb-4">AgroConnect Marketplace</h1>

<p class="mb-6">
Browse fresh agricultural products directly from farmers.
</p>

<div class="flex justify-center">
<input
type="text"
id="searchInput"
placeholder="Search products or location..."
onkeyup="searchProducts()"
class="w-full max-w-lg p-3 rounded-lg text-black"
>
</div>

</section>

<!-- PRODUCT GRID -->
<main class="max-w-7xl mx-auto px-6 py-12">

<div
id="productList"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"
>

<!-- Example Product Card -->
<div class="bg-white rounded-xl shadow hover:shadow-lg transition">

<img src="maize.jpg" class="w-full h-48 object-cover rounded-t-xl">

<div class="p-4">

<h3 class="text-lg font-bold">Fresh Maize</h3>

<p class="text-gray-600">Location: Limpopo</p>

<p class="text-green-700 font-semibold mt-2">R120 / bag</p>

<button class="mt-4 w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
View Details
</button>

</div>

</div>

</div>

</main>

<!-- FOOTER -->
<footer class="bg-gray-900 text-white text-center py-6">

<p>© 2026 AgroConnect Marketplace</p>

</footer>

<script src="product.js"></script>

</body>
</html>
