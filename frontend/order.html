<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order & Delivery</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<header class="bg-green-700 text-white p-6 text-center">
<h1 class="text-2xl font-bold">Order Summary</h1>
</header>

<!-- ORDER CARD -->
<div class="max-w-xl mx-auto mt-10 bg-white rounded-xl shadow p-8 space-y-5">

<h2 class="text-2xl font-bold text-green-700 text-center">
Product Order Details
</h2>

<div>
<p class="text-gray-700 font-semibold">Product Name</p>
<p id="productName" class="text-lg"></p>
</div>

<div>
<p class="text-gray-700 font-semibold">Pickup Location</p>
<p id="pickupLocation"></p>
</div>

<div>
<label class="block mb-1 font-medium">Quantity (kg)</label>
<input
type="number"
id="orderQty"
placeholder="Enter quantity"
class="w-full border rounded-lg p-3"
>
</div>

<div>
<label class="block mb-1 font-medium">Delivery Location</label>
<input
type="text"
id="deliveryLocation"
placeholder="Enter delivery location"
class="w-full border rounded-lg p-3"
>
</div>

<button
onclick="requestDelivery()"
class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold">

Request Delivery

</button>

</div>

<script src="delivery.js"></script>

</body>
</html>
