<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | AgroConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[url('farm-register.jpg')] bg-cover bg-center min-h-screen flex items-center justify-center">

<!-- REGISTER CARD -->
<div class="bg-white shadow-xl rounded-xl p-10 w-full max-w-md">

<h2 class="text-3xl font-bold text-center text-green-700 mb-6">
Create an Account
</h2>

<form id="registerForm" class="space-y-5">

<div>
<label class="block text-gray-700 mb-1">Full Name</label>
<input
type="text"
id="name"
name="name"
placeholder="Enter your full name"
class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
required>
</div>

<div>
<label class="block text-gray-700 mb-1">Email</label>
<input
type="email"
id="email"
name="email"
placeholder="Enter your email"
class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
required>
</div>

<div>
<label class="block text-gray-700 mb-1">Password</label>
<input
type="password"
id="password"
name="password"
placeholder="Create a password"
class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
required>
</div>

<div>
<label class="block text-gray-700 mb-1">Select Role</label>
<select
id="role"
class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
required>
<option value="farmer">Farmer</option>
<option value="buyer">Buyer</option>
<option value="transporter">Transporter</option>
</select>
</div>

<button
type="submit"
class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition">
Register
</button>

</form>

<p class="text-center text-gray-600 mt-6">
Already have an account?
<a href="login.html" class="text-green-600 font-semibold hover:underline">
Login here
</a>
</p>

</div>

<script src="register.js"></script>

</body>
</html>
