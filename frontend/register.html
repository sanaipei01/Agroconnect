<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | AgroConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="relative min-h-screen flex items-center justify-center font-sans">

<!-- BACKGROUND IMAGE -->

<div class="absolute inset-0 bg-[url('farm-register.jpg')] bg-cover bg-center"></div>

<!-- DARK OVERLAY -->

<div class="absolute inset-0 bg-black/50"></div>

<!-- REGISTER CARD -->

<div class="relative bg-white/10 backdrop-blur-lg border border-white/20 shadow-xl rounded-xl p-10 w-full max-w-md">

<h2 class="text-3xl font-bold text-center text-green-400 mb-6">
Create an Account
</h2>

<form id="registerForm" class="space-y-5">

<div>
<label class="block text-white mb-1">Full Name</label>
<input
type="text"
id="name"
name="name"
placeholder="Enter your full name"
class="w-full bg-white/20 text-white placeholder-gray-200 border border-white/30 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-400"
required>
</div>

<div>
<label class="block text-white mb-1">Email</label>
<input
type="email"
id="email"
name="email"
placeholder="Enter your email"
class="w-full bg-white/20 text-white placeholder-gray-200 border border-white/30 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-400"
required>
</div>

<div>
<label class="block text-white mb-1">Password</label>
<input
type="password"
id="password"
name="password"
placeholder="Create a password"
class="w-full bg-white/20 text-white placeholder-gray-200 border border-white/30 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-400"
required>
</div>

<div>
<label class="block text-white mb-1">Select Role</label>
<select
id="role"
class="w-full bg-white/20 text-white border border-white/30 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-400"
required>
<option value="farmer" class="text-black">Farmer</option>
<option value="buyer" class="text-black">Buyer</option>
<option value="transporter" class="text-black">Transporter</option>
</select>
</div>

<button
type="submit"
class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition">
Register </button>

</form>

<p class="text-center text-gray-200 mt-6">
Already have an account?
<a href="login.html" class="text-green-400 font-semibold hover:underline">
Login here
</a>
</p>

</div>

<script src="register.js"></script>

</body>
</html>
