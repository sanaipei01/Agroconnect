<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Dashboard | AgroConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- NAVBAR -->
    <header class="bg-green-600 text-white py-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-2xl font-bold">Delivery Requests</h1>
            <button onclick="logout()" class="bg-white text-green-600 px-4 py-2 rounded hover:bg-gray-100">
                Log Out
            </button>
        </div>
    </header>

    <!-- DELIVERY LIST -->
    <main class="container mx-auto px-4 mt-6">
        <section id="deliveryList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Delivery cards will be injected here -->
        </section>
    </main>

    <script src="transport.js"></script>
    <script>
        function logout() {
            
            alert("Logged out!");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
